services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-CU13-ubuntu-22.04
    container_name: ticket-turno-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "SQLCMD=\"/opt/mssql-tools/bin/sqlcmd\"; if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then SQLCMD=\"/opt/mssql-tools18/bin/sqlcmd\"; fi; $$SQLCMD -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -b -o /dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - ticket-turno-net

  backend:
    build:
      context: ./ticket-turno-backend
      dockerfile: Dockerfile
    container_name: ticket-turno-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=db,1433;Database=TicketTurnoDb;User Id=sa;Password=${SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;Encrypt=False
    ports:
      - "5111:8080"
    networks:
      - ticket-turno-net

  frontend:
    build:
      context: ./ticket-turno-frontend
      dockerfile: Dockerfile
    container_name: ticket-turno-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - ticket-turno-net

volumes:
  mssql-data:

networks:
  ticket-turno-net:
    driver: bridge
